name: Build Focus Vision PCVR

on:
    push:
      branches: [main]
    pull_request:
      branches: [main]
jobs:
    rust-build:
      name: Rust Streaming Engine
      runs-on: windows-latest
      steps:
        - uses: actions/checkout@v4
          with:
            submodules: recursive
        - uses: dtolnay/rust-toolchain@stable
        - name: Build
          run: cargo build --release -p streaming-engine
        - name: Test
          run: cargo test --release --workspace
        - uses: actions/upload-artifact@v4
          with:
            name: streaming-engine-lib
            path: target/release/streaming_engine.lib

    driver-build:
      name: OpenVR Driver DLL
      runs-on: windows-latest
      needs: rust-build
      steps:
        - uses: actions/checkout@v4
          with:
            submodules: recursive
        - uses: dtolnay/rust-toolchain@stable
        - run: cargo build --release -p streaming-engine
        - run: cmake -B driver/build -S driver -DCMAKE_BUILD_TYPE=Release
        - run: cmake --build driver/build --config Release
        - uses: actions/upload-artifact@v4
          with:
            name: openvr-driver
            path: driver/build/focus_vision_pcvr/

    android-build:
      name: Android OpenXR Client
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
          with:
            submodules: recursive
        - uses: actions/setup-java@v4
          with:
            distribution: temurin
            java-version: '17'
        - name: Setup Android SDK
          uses: android-actions/setup-android@v3
        - name: Install NDK and CMake
          run: |
            sdkmanager --install "ndk;26.1.10909125" "cmake;3.22.1"
        - uses: gradle/actions/setup-gradle@v4
          with:
            gradle-version: '8.5'
        - name: Build APK
          working-directory: client
          run: gradle assembleDebug -Pandroid.ndkVersion=26.1.10909125
        - uses: actions/upload-artifact@v4
          with:
            name: android-client
            path: client/app/build/outputs/apk/debug/*.apk
