name: Build Focus Vision PCVR

on:
    push:
      branches: [main]
    pull_request:
      branches: [main]
jobs:
    rust-build:
      name: Rust Streaming Engine
      runs-on: windows-latest
      steps:
        - uses: actions/checkout@v4
          with:
            submodules: recursive
        - uses: dtolnay/rust-toolchain@stable
        - name: Build
          run: cargo build --release -p streaming-engine
        - name: Test
          run: cargo test --release --workspace
        - uses: actions/upload-artifact@v4
          with:
            name: streaming-engine-lib
            path: target/release/streaming_engine.lib

    driver-build:
      name: OpenVR Driver DLL
      runs-on: windows-latest
      needs: rust-build
      steps:
        - uses: actions/checkout@v4
          with:
            submodules: recursive
        - uses: dtolnay/rust-toolchain@stable
        - run: cargo build --release -p streaming-engine
        - run: cmake -B driver/build -S driver -DCMAKE_BUILD_TYPE=Release
        - run: cmake --build driver/build --config Release
        - uses: actions/upload-artifact@v4
          with:
            name: openvr-driver
            path: driver/build/focus_vision_pcvr/
