name: Build Focus Vision PCVR

on:
    push:
      branches: [main]
      tags: ['v*']
    pull_request:
      branches: [main]

jobs:
    rust-build:
      name: Rust Streaming Engine
      runs-on: windows-latest
      steps:
        - uses: actions/checkout@v4
          with:
            submodules: recursive
        - uses: dtolnay/rust-toolchain@stable
        - name: Build
          run: cargo build --release -p streaming-engine
        - name: Test
          run: cargo test --release --workspace
        - name: Clippy
          run: cargo clippy --workspace -- -D warnings
        - uses: actions/upload-artifact@v4
          with:
            name: streaming-engine-lib
            path: target/release/streaming_engine.lib

    companion-build:
      name: Companion App
      runs-on: windows-latest
      steps:
        - uses: actions/checkout@v4
          with:
            submodules: recursive
        - uses: dtolnay/rust-toolchain@stable
        - name: Build companion app
          run: cargo build --release -p focus-vision-companion
        - name: Download fonts
          shell: bash
          run: |
            mkdir -p dist/fonts
            # Instrument Serif from Google Fonts API
            curl -sL -o dist/fonts/InstrumentSerif-Regular.ttf \
              "https://github.com/google/fonts/raw/main/ofl/instrumentserif/InstrumentSerif-Regular.ttf" || true
            # Geist from Vercel
            curl -sL -o dist/fonts/Geist-Regular.ttf \
              "https://github.com/vercel/geist-font/raw/main/packages/geist-font/fonts/geist-sans/Geist-Regular.ttf" || true
            curl -sL -o dist/fonts/GeistMono-Regular.ttf \
              "https://github.com/vercel/geist-font/raw/main/packages/geist-mono/fonts/geist-mono/GeistMono-Regular.ttf" || true
            ls -la dist/fonts/
        - name: Package companion app
          shell: bash
          run: |
            mkdir -p dist/config
            cp target/release/focus-vision.exe dist/
            cp config/default.toml dist/config/
            ls -la dist/ dist/fonts/ dist/config/
        - uses: actions/upload-artifact@v4
          with:
            name: companion-app
            path: dist/

    driver-build:
      name: OpenVR Driver DLL
      runs-on: windows-latest
      needs: rust-build
      steps:
        - uses: actions/checkout@v4
          with:
            submodules: recursive
        - uses: dtolnay/rust-toolchain@stable
        - run: cargo build --release -p streaming-engine
        - run: cmake -B driver/build -S driver -DCMAKE_BUILD_TYPE=Release
        - run: cmake --build driver/build --config Release
        - uses: actions/upload-artifact@v4
          with:
            name: openvr-driver
            path: driver/build/focus_vision_pcvr/

    android-build:
      name: Android OpenXR Client
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
          with:
            submodules: recursive
        - uses: actions/setup-java@v4
          with:
            distribution: temurin
            java-version: '17'
        - name: Setup Android SDK
          uses: android-actions/setup-android@v3
        - name: Install NDK and CMake
          run: |
            sdkmanager --install "ndk;26.1.10909125" "cmake;3.22.1"
        - uses: gradle/actions/setup-gradle@v4
          with:
            gradle-version: '8.5'
        - name: Build APK
          working-directory: client
          run: gradle assembleDebug -Pandroid.ndkVersion=26.1.10909125
        - uses: actions/upload-artifact@v4
          with:
            name: android-client
            path: client/app/build/outputs/apk/debug/*.apk

    release:
      name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      runs-on: ubuntu-latest
      needs: [companion-build, driver-build, android-build]
      permissions:
        contents: write
      steps:
        - uses: actions/checkout@v4
        - uses: actions/download-artifact@v4
          with:
            path: artifacts/
        - name: Package release archives
          run: |
            cd artifacts
            # Companion app zip
            cd companion-app && zip -r ../../FocusVision-Companion-${{ github.ref_name }}.zip . && cd ..
            # Driver zip
            cd openvr-driver && zip -r ../../FocusVision-Driver-${{ github.ref_name }}.zip . && cd ..
            # APK (copy as-is)
            cp android-client/*.apk ../FocusVision-Client-${{ github.ref_name }}.apk 2>/dev/null || true
            cd ..
        - name: Create GitHub Release
          uses: softprops/action-gh-release@v2
          with:
            generate_release_notes: true
            files: |
              FocusVision-Companion-*.zip
              FocusVision-Driver-*.zip
              FocusVision-Client-*.apk
