[network]
tcp_port = 9944
udp_port = 9945
fec_redundancy = 0.2
fec_redundancy_min = 0.05    # Adaptive FEC minimum (low loss → bandwidth saving)
fec_redundancy_max = 0.40    # Adaptive FEC maximum (high loss → max protection)

[video]
codec = "h265"
bitrate_mbps = 80
resolution_per_eye = [1832, 1920]
framerate = 90
full_range = true     # Full RGB (0-255) instead of limited (16-235)

[display]
ipd = 0.063
seconds_from_vsync_to_photons = 0.011

[audio]
enabled = true
bitrate_kbps = 128
frame_size_ms = 10
sample_rate = 48000
channels = 2

[foveated]
enabled = false
preset = "balanced"      # subtle (+3/+8), balanced (+5/+15), aggressive (+8/+25), custom
fovea_radius = 0.15
mid_radius = 0.35
mid_qp_offset = 5        # only used when preset = "custom"
peripheral_qp_offset = 15

[face_tracking]
enabled = true
smoothing = 0.6    # EMA factor (0.0 = no smoothing, 0.99 = very smooth)
osc_port = 9000
active_profile = ""  # Expression profile name (empty = no profile)

[sleep_mode]
enabled = true
timeout_seconds = 300       # 5 minutes of inactivity → sleep
motion_threshold = 0.002    # meters per frame (~0.18m/s at 90fps)
sleep_bitrate_mbps = 8      # reduced bitrate during sleep

[pairing]
max_attempts = 5
lockout_seconds = 300
